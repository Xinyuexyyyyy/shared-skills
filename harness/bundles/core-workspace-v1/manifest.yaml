schema_version: '1'
kind: bundle
id: core-workspace-v1
version: 0.1.0
status: draft
description: Reusable workspace workflow, output control, routing, memory, closeout,
  and runtime adapters
runtime: neutral
entrypoint: rules/workflow.md
workflow:
  id: single-turn-workflow
  version: 1.0.0
  stages:
  - input-hygiene
  - digest
  - broad-route
  - theme-adapter
  - artifact-gate
  - execution
  - verification
  - output-control
  - closeout
  - inspiration-manual-only
memory_policy:
  private_root: .claude/memory
  lazy_load: true
  write_requires_confirmation: true
input_capture:
  enabled: false
runtime_adapters:
  codex: adapters/codex.md
  claude: adapters/claude.md
checks:
  structure: scripts/validate-harness.sh
  negative_tests: tests/test-validate-harness.sh
