schema_version: '1'
kind: bundle
id: core-workspace-v2
version: 0.1.0
status: draft
description: Full reusable workspace harness with workflow, skills, memory tools,
  hooks, and runtime templates
runtime: neutral
entrypoint: rules/workflow.md
capability_map: CAPABILITY-MAP.yaml
workflow:
  id: single-turn-workflow
  version: 1.0.0
  stages:
  - input-hygiene
  - digest
  - broad-route
  - theme-adapter
  - artifact-gate
  - execution
  - verification
  - output-control
  - closeout
  - inspiration-manual-only
memory_policy:
