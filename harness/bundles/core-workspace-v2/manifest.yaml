  claude_registration: runtime/claude/settings.hooks.json.tmpl
checks:
  structure: scripts/validate-harness.sh
  negative_tests: tests/test-validate-harness.sh
  capability_parity: tests/test-full-capability-parity.sh
  hook_behavior: tests/test-runtime-hooks.py
  memory_tools: tests/test-memory-tools.sh
