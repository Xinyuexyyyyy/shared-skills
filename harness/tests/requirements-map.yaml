schema_version: "1"
kind: requirement-test-map
requirements:
  - id: config-schema
    tests: [test_five_configs_and_schemas_validate, test_invalid_nested_policy_boolean_fails_schema]
  - id: missing-config
    tests: [test_missing_required_config_fails]
  - id: manifest-check-path
    tests: [test_missing_manifest_check_path_fails]
  - id: check-scope
    tests: [test_bundle_and_library_only_checks_are_distinguished]
  - id: manifest-sha
    tests: [test_manifest_sha_mismatch_fails, test_manifest_validation_direct]
  - id: undeclared-file
    tests: [test_undeclared_bundle_file_fails]
  - id: entry-budget
    tests: [test_entry_budget_hard_limit_fails]
  - id: deterministic-assembly
    tests: [test_two_assemblies_are_deterministic]
  - id: legacy-draft
    tests: [test_v1_and_v2_remain_legacy_drafts]
  - id: hard-enforced-evidence
    tests:
      - test_hard_enforced_capability_without_script_fails
      - test_hard_enforced_script_must_match_registration
      - test_hard_enforced_check_must_cover_capability
      - test_hard_enforced_evidence_requires_registry_coverage
      - test_registered_tests_are_executed
      - test_registered_selector_cannot_be_reassigned
  - id: stable-gate
    tests:
      - test_stable_is_false_without_new_session_evidence
      - test_manual_passed_runtime_evidence_cannot_promote
      - test_stable_requires_candidate_gate
  - id: no-pycache
    tests: [test_assemble_does_not_write_pycache_into_bundle]
  - id: synthetic-fixtures
    tests: [test_fixtures_are_synthetic]
  - id: health-json
    tests: [test_health_json_has_stable_fields, test_health_returns_nonzero_for_invalid_health]
  - id: workflow-semantics
    tests:
      - test_workflow_ghost_state_and_terminal_exit_fail
      - test_turn_envelope_schema_is_single_field_owner
      - test_closeout_requires_exact_outcome_states
  - id: check-execution
    tests:
      - test_declared_check_is_executed
      - test_check_command_cannot_bypass_declared_script
      - test_declared_check_runs_in_sandbox
      - test_check_cannot_escape_sandbox
      - test_registered_test_cannot_escape_sandbox
  - id: privacy-boundary
    tests:
      - test_sensitive_bundle_content_is_rejected
      - test_session_history_is_not_assemblable
      - test_structured_credential_keys_are_rejected
  - id: source-identity
    tests:
      - test_manifest_contains_source_identity
      - test_source_identity_values_are_enforced
      - test_source_provenance_requires_git_or_explicit_unverified_mode
  - id: requirements-map
    tests: [test_requirements_map_is_enforced, test_requirement_selector_swap_fails]
  - id: doctor
    tests: [test_doctor_reports_missing_pyyaml_without_crashing, test_doctor_reports_hook_and_interpreter_boundaries]
  - id: method-skill-budgets
    tests: [test_method_and_skill_budgets_are_consumed]
  - id: memory-topic-budget
    tests: [test_memory_topic_budget_hard_limit_fails]
