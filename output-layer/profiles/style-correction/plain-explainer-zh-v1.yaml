name: plain-explainer-zh-v1
description: 朴素解释型中文风格校正预设（第一版）
rules:
  paragraph_prefix_rewrites: on
  sentence_rewrites: on
  trim_whitespace: on
findings:
  weak_opener:
    enabled: on
    prefixes: 需要注意的是，,值得注意的是，,某种程度上，,从某种意义上说，,说到底，,归根结底，
    severity: low
    message: 开头有套话，可以更直接。
  repeated_template_phrases:
    enabled: on
    phrases: 需要注意的是,值得注意的是,某种程度上,从某种意义上说,换句话说,也就是说
    threshold: 3
    severity: low
    message: 解释连接词重复偏多，读起来会机械。
  weak_explicit_judgment:
    enabled: on
    markers: 我的判断是,核心是,关键是,真正的问题,问题在于,简单说
    severity: low
    message: 缺少一句直接判断，读者不容易抓住重点。
rewrites:
  paragraph_prefix:
    需要注意的是，: <DELETE>
    值得注意的是，: <DELETE>
    某种程度上，: <DELETE>
    从某种意义上说，: <DELETE>
    说到底，: <DELETE>
    归根结底，: <DELETE>
    我现在越来越倾向于一个判断：: 我的判断是：
    这件事真正值得问的问题，不是: 真正的问题不是
  sentence:
    换句话说，我们可以理解为: 换句话说，
    这背后反映出的其实是: 这背后是
    也就是说，我们可以看到: 也就是说，
